<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NIKKOPPON — Volvemos pronto</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Quicksand:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="logo-nikkoppon2.png">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;height:100%;}
  body{
    display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:24px;text-align:center;
    background:
      radial-gradient(circle at 8% 8%, rgba(255,93,168,0.22), transparent 40%),
      radial-gradient(circle at 92% 12%, rgba(95,214,255,0.28), transparent 42%),
      radial-gradient(circle at 50% 95%, rgba(155,235,201,0.25), transparent 45%),
      #FCEFFB;
    font-family:'Quicksand',sans-serif;
    color:#211334;
    position:relative;
    overflow:hidden;
  }
  .card{
    background:#FFFFFF;border:3px solid #C7A4E8;border-radius:24px;
    padding:44px 36px;max-width:420px;width:100%;
    box-shadow:0 16px 32px rgba(140,79,209,0.18);
    position:relative;z-index:2;
  }
  .logo{width:110px;height:auto;margin-bottom:18px;filter:drop-shadow(0 6px 14px rgba(140,79,209,0.3));}
  h1{
    font-family:'Baloo 2';font-weight:800;font-size:26px;margin:0 0 12px;
    background:linear-gradient(90deg, #B15CFF, #FF5DA8);
    -webkit-background-clip:text;background-clip:text;color:transparent;
  }
  p{font-size:15px;line-height:1.6;color:#5E4E7A;font-weight:600;margin:0 0 8px;}
  .ig{
    display:inline-flex;align-items:center;gap:8px;margin-top:18px;
    color:#8C4FD1;font-weight:700;text-decoration:none;font-size:14px;
  }
  .ig:hover{text-decoration:underline;}
  .spark{position:absolute;font-size:20px;color:#FF5DA8;opacity:0.7;}
  .s1{top:8%;left:10%;} .s2{bottom:10%;right:8%;color:#5FD6FF;} .s3{top:14%;right:14%;color:#FFE066;font-size:14px;}
</style>
</head>
<body>
  <span class="spark s1">✦</span>
  <span class="spark s2">✦</span>
  <span class="spark s3">✧</span>

  <div class="card">
    <img class="logo" src="logo-nikkoppon.png" alt="Logo NIKKOPPON">
    <h1>¡Volvemos muy pronto!</h1>
    <p>Estamos actualizando la tienda para traerte cosas nuevas.</p>
    <p>Vuelve a visitarnos en un rato ✦</p>
    <a class="ig" href="https://instagram.com/nikkoppon" target="_blank" rel="noopener">Mientras tanto, síguenos en Instagram →</a>
  </div>
</body>
</html>
